<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KarmaYogi</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="blocked.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <p class="eyebrow">Focus Mode</p>
        <h1 class="title">This site is blocked.</h1>
        <p class="body-copy">KarmaYogi will redirect here when a distracting site is opened.</p>
        <div class="site-chip" id="blocked-site">Blocked site</div>
        <blockquote class="quote-card">
          <p class="quote-text" id="quote-text"></p>
          <footer class="quote-source" id="quote-source"></footer>
        </blockquote>
      </section>
    </main>
    <script src="quotes.js"></script>
    <script src="blocked.js"></script>
  </body>
</html>
